<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Fetch Fake interceptor(Wrapper)</title>
</head>
<body>

<h1>Fetch Fake Interceptor</h1>
<button id="btn">Call API</button>
<pre id="out"></pre>

<script>

const out = document.getElementById("out");

  let authToken = "my-super-token";

  fetch = ((originalFetch) => {
    return async (input, init = {}) => {
      // -------- REQUEST INTERCEPTOR --------
      const url = typeof input === "string" ? input : input.url;
      const method = (init.method || "GET").toUpperCase();

      const headers = new Headers(init.headers || {});
      headers.set("Accept", "application/json");
      // Example: inject auth
      headers.set("Authorization", `Bearer ${authToken}`);

      const start = performance.now();

      // recreating init with normalized headers
      const nextInit = { ...init, headers };

      try {
        const response = await originalFetch(input, nextInit);

        // -------- RESPONSE INTERCEPTOR --------
        const durationMs = performance.now() - start;
        console.log(`[fetch] ${method} ${url} -> ${response.status} (${durationMs.toFixed(0)}ms)`);

        // -------- ERROR INTERCEPTOR (HTTP) --------
        if (!response.ok) {
          const cloned = response.clone();

          let data = null;
          const contentType = cloned.headers.get("content-type") || "";

          if (contentType.includes("application/json")) {
            data = await cloned.json().catch(() => null);
          } else {
            const text = await cloned.text().catch(() => "");
            data = text ? { message: text } : null;
          }

          const error = new Error(data?.message || `HTTP ${response.status} ${response.statusText}`);
          error.isHttpError = true;
          error.response = {
            status: response.status,
            statusText: response.statusText,
            headers: Object.fromEntries(response.headers.entries()),
            data, 
            url,
            method,
          };

          throw error;
        }

        return response;
      } catch (err) {
        // -------- NETWORK/ABORT ERROR INTERCEPTOR --------

        console.log(`[fetch] ${method} ${url} -> NETWORK/ABORT ERROR`, err);
        throw err;
      }
    };
  })(fetch);



document.getElementById("btn").onclick = async () => {

  out.textContent = "Calling API...";

  try {
    
    const start = performance.now();

    const response = await fetch("https://jsonplaceholder.typicode.com/todos/1");

    const duration = performance.now() - start;
    out.textContent += `\n[Response wrapper] Request took ${duration.toFixed(0)}ms`;

    const data = await response.json().catch(() => null);

    // ====== RESPONSE INTERCEPTOR ======
    if (!response.ok) {

      out.textContent += `\n[Response wrapper] HTTP error: ${response.status}`;

      if (response.status === 401) {
        out.textContent += "\nToken expired → redirect to login";
      }

      throw { status: response.status, data };
    }

    out.textContent += "\n\nResponse:\n" + JSON.stringify(data, null, 2);
  } catch (e) {
    console.error("Call failed", e);
    out.textContent += "\n\nCall failed.";
  }
};

</script>
</body>
</html>
